  <title>납품 관리 Pro</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #0c0c13;
      color: #eaeaf4;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .icon {
      width: 88px;
      height: 88px;
      border-radius: 24px;
      background: linear-gradient(135deg, #6c63ff, #9d94ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      box-shadow: 0 8px 32px rgba(108,99,255,.45);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(108,99,255,.45); }
      50%       { box-shadow: 0 8px 48px rgba(108,99,255,.75); }
    }
    .title  { font-size: 22px; font-weight: 900; letter-spacing: -.5px; }
    .sub    { font-size: 13px; color: #7878a0; }
    .bar-wrap {
      width: 180px;
      height: 4px;
      background: #1a1a25;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6c63ff, #9d94ff);
      border-radius: 99px;
      animation: load 1.2s ease-in-out forwards;
    }
    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="icon">📦</div>
  <div>
    <div class="title">납품 관리 Pro</div>
    <div class="sub" style="text-align:center;margin-top:4px;">v58 · 잠시 후 시작됩니다…</div>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>

  <script>
    // 로딩 바 완료 후 메인 앱으로 이동
    document.getElementById('bar').addEventListener('animationend', () => {
      location.replace('거래장완성_v58.html');
    });
    // 혹시 애니메이션 이벤트 미발생 시 폴백
    setTimeout(() => location.replace('거래장완성_v58.html'), 1400);
  </script>
</body>
